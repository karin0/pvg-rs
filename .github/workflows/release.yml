name: Release

on:
  release:
    types: [published] # include pre-releases

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit

  package-and-upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pvg-bin-*
          path: bin

      - uses: robinraju/release-downloader@v1.8
        with:
          repository: karin0/pvg-app
          latest: true
          fileName: "pvg-app-*.zip"
          out-file-path: static
          extract: true

      - name: Package release zip
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name }}"
          mkdir -p release-assets

          mapfile -t artifact_dirs < <(find bin -mindepth 1 -maxdepth 1 -type d | sort)
          if [[ ${#artifact_dirs[@]} -eq 0 ]]; then
            echo "No build artifacts found under bin/" >&2
            exit 1
          fi

          for artifact_dir in "${artifact_dirs[@]}"; do
            artifact_name="$(basename "$artifact_dir")"
            target="${artifact_name#pvg-bin-}"
            bin_file="$(find "$artifact_dir" -maxdepth 1 -type f | head -n 1)"
            if [[ -z "$bin_file" ]]; then
              echo "Binary artifact is missing for $target" >&2
              exit 1
            fi

            dist_dir="dist-$target"
            mkdir "$dist_dir"
            cp "$bin_file" "$dist_dir/"
            cp -r static "$dist_dir/static"
            rm -f "$dist_dir"/static/*.zip

            zip_file="pvg-${TAG}-${target}.zip"
            (cd "$dist_dir" && zip -r "../release-assets/$zip_file" .)
          done

      - name: Upload to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ github.event.release.tag_name }}" release-assets/*.zip --clobber
